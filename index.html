<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlowFinance</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FlowFinance">
    <meta name="theme-color" content="#020617">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <style>
        :root { --accent: #3b82f6; --bg: #020617; --panel: rgba(30, 41, 59, 0.6); --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: rgba(255,255,255,0.08); }
        body.light-theme { --accent: #2563eb; --bg: #f1f5f9; --panel: rgba(255, 255, 255, 0.8); --text-main: #0f172a; --text-muted: #64748b; --border-color: rgba(0,0,0,0.06); }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; transition: background 0.4s; min-height: 100vh; overflow-x: hidden; }
        [v-cloak] { display: none !important; }
        .panel { background: var(--panel); backdrop-filter: blur(24px); border: 1px solid var(--border-color); border-radius: 2rem; }
        .input-huge { background: transparent; border: none; font-size: 3.5rem; font-weight: 900; text-align: center; color: var(--text-main); width: 100%; outline: none; }
        .slide-up-enter-active, .slide-up-leave-active { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up-enter-from, .slide-up-leave-to { opacity: 0; transform: translateY(40px); }
        .logo-path { stroke-dasharray: 150; stroke-dashoffset: 150; animation: drawLine 1.5s forwards; }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="pb-32 antialiased">
    <div id="app" v-cloak class="max-w-md mx-auto p-4 min-h-screen flex flex-col relative z-10">
        
        <div v-if="!appLoaded" class="fixed inset-0 z-[999] flex flex-col items-center justify-center" :style="{ background: 'var(--bg)' }">
            <div class="w-24 h-24 mb-6">
                <svg viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path class="logo-path" d="M 15 80 Q 40 80, 55 55 T 80 25" stroke="#3b82f6" stroke-width="10" />
                    <path d="M 55 25 L 80 25 L 80 50" stroke="#10b981" stroke-width="10" />
                </svg>
            </div>
            <h1 class="text-3xl font-900 tracking-tighter">Flow<span class="text-blue-500">Finance</span></h1>
        </div>

        <div v-show="appLoaded" class="contents">
            <header class="flex justify-between items-center py-4">
                <h1 class="text-2xl font-900 tracking-tighter">Flow<span class="text-blue-500">Finance</span></h1>
                <div class="flex gap-2">
                    <button @click="toggleTheme" class="w-10 h-10 rounded-full panel flex items-center justify-center text-xl">
                        {{ isLight ? '🌙' : '☀️' }}
                    </button>
                    <button @click="hardReset" class="w-10 h-10 rounded-full panel flex items-center justify-center text-xl">🗑️</button>
                </div>
            </header>

            <div v-if="!sessionMode" class="space-y-6">
                <div class="panel p-6">
                    <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Общий баланс</p>
                    <div class="text-4xl font-900 tracking-tighter" :class="balance >= 0 ? '' : 'text-rose-500'">
                        {{ balance.toFixed(2) }}<span class="text-xl text-blue-500 ml-1">€</span>
                    </div>
                    <div class="flex justify-between pt-4 mt-4 border-t border-white/5">
                        <div class="text-green-500 font-900">+{{ income.toFixed(0) }}€</div>
                        <div class="text-rose-500 font-900">-{{ expense.toFixed(0) }}€</div>
                    </div>
                </div>

                <div class="space-y-3">
                    <h2 class="text-[10px] text-muted font-bold uppercase tracking-widest ml-4">История</h2>
                    <div v-if="transactions.length === 0" class="p-10 text-center opacity-30 text-xs font-bold uppercase">Нет данных</div>
                    <div v-for="t in transactions" :key="t.id" class="panel p-4 flex justify-between items-center" @click="deleteTx(t.id)">
                        <div class="flex items-center gap-3">
                            <div class="text-2xl">{{ getIcon(t.cat) }}</div>
                            <div>
                                <h3 class="font-900 text-sm">{{ t.name }}</h3>
                                <p class="text-[9px] text-muted">{{ t.date }}</p>
                            </div>
                        </div>
                        <div class="font-900" :class="t.amount > 0 ? 'text-green-500' : ''">
                            {{ t.amount > 0 ? '+' : '' }}{{ t.amount.toFixed(2) }}€
                        </div>
                    </div>
                </div>
            </div>

            <transition name="slide-up">
                <div v-if="sessionMode" class="panel p-6 fixed inset-x-4 top-20 z-50 min-h-[50vh] flex flex-col shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <span class="text-[10px] font-bold text-muted uppercase tracking-widest">Шаг {{ currentStep }}</span>
                        <button @click="sessionMode = false">Отмена</button>
                    </div>

                    <div v-if="currentStep === 1" class="flex-1 flex flex-col justify-center">
                        <div class="flex justify-center gap-4 mb-8">
                            <button @click="wizard.type = 'expense'" :class="wizard.type === 'expense' ? 'bg-white text-black' : 'bg-white/5'" class="px-6 py-2 rounded-full font-bold text-xs uppercase">Расход</button>
                            <button @click="wizard.type = 'income'" :class="wizard.type === 'income' ? 'bg-white text-black' : 'bg-white/5'" class="px-6 py-2 rounded-full font-bold text-xs uppercase">Доход</button>
                        </div>
                        <input type="number" v-model.number="wizard.amount" class="input-huge" placeholder="0" autofocus>
                        <button @click="currentStep = 2" v-if="wizard.amount > 0" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-900 mt-8 uppercase tracking-widest">Выбрать категорию</button>
                    </div>

                    <div v-if="currentStep === 2" class="grid grid-cols-3 gap-3">
                        <button v-for="c in categories" @click="save(c)" class="bg-white/5 p-4 rounded-2xl flex flex-col items-center">
                            <span class="text-3xl mb-1">{{ c.icon }}</span>
                            <span class="text-[9px] font-bold uppercase text-center">{{ c.name }}</span>
                        </button>
                    </div>
                </div>
            </transition>

            <button v-if="!sessionMode" @click="openWizard" class="fixed bottom-8 right-6 w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-xl active:scale-90 transition-transform">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const transactions = ref([]), appLoaded = ref(false), sessionMode = ref(false);
                const isLight = ref(localStorage.getItem('theme') === 'light'), currentStep = ref(1), wizard = ref({});
                const categories = [{name:'Еда', icon:'🍎'}, {name:'Авто', icon:'🚗'}, {name:'Дом', icon:'🏠'}, {name:'ЗП', icon:'💰'}, {name:'Спорт', icon:'💪'}, {name:'Прочее', icon:'📦'}];

                onMounted(() => {
                    if (isLight.value) document.body.classList.add('light-theme');
                    transactions.value = JSON.parse(localStorage.getItem('finance_v8')) || [];
                    setTimeout(() => appLoaded.value = true, 1000);
                });

                const save = (cat) => {
                    transactions.value.unshift({
                        id: Date.now(),
                        amount: wizard.value.type === 'expense' ? -wizard.value.amount : wizard.value.amount,
                        cat: cat.name, name: cat.name,
                        date: new Date().toLocaleDateString('ru-RU')
                    });
                    localStorage.setItem('finance_v8', JSON.stringify(transactions.value));
                    sessionMode.value = false;
                };

                return {
                    transactions, appLoaded, isLight, sessionMode, currentStep, wizard, categories,
                    balance: computed(() => transactions.value.reduce((s, t) => s + t.amount, 0)),
                    income: computed(() => transactions.value.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0)),
                    expense: computed(() => transactions.value.filter(t => t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0)),
                    openWizard: () => { wizard.value = { amount: '', type: 'expense' }; currentStep.value = 1; sessionMode.value = true; },
                    save, deleteTx: (id) => { if(confirm('Удалить?')) { transactions.value = transactions.value.filter(t => t.id !== id); localStorage.setItem('finance_v8', JSON.stringify(transactions.value)); } },
                    getIcon: (n) => categories.find(c => c.name === n)?.icon || '📦',
                    toggleTheme: () => { isLight.value = !isLight.value; localStorage.setItem('theme', isLight.value ? 'light' : 'dark'); document.body.classList.toggle('light-theme'); },
                    hardReset: () => { if(confirm('Сбросить данные?')) { transactions.value = []; localStorage.removeItem('finance_v8'); } }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
